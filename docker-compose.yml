version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: factweaver_landing
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates from the local 'certs' directory
      # Ensure you have server.crt and server.key in ./certs/
      - ./certs:/etc/nginx/certs:ro
    restart: always
    environment:
      - NODE_ENV=production
